name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable

      - name: Generate Android platform
        run: flutter create --platforms=android .

      - name: Configure Android application
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          permission = '<uses-permission android:name="android.permission.CAMERA" />'
          if permission not in text:
              insert_at = text.find(">") + 1
              text = text[:insert_at] + f"\n    {permission}" + text[insert_at:]
          text = text.replace('android:label="ascona_returns_scanner"', 'android:label="ASCONA Scanner"')
          manifest.write_text(text, encoding="utf-8")
          PY

      - name: Configure Android min SDK
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in [Path("android/app/build.gradle"), Path("android/app/build.gradle.kts")]:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              text = text.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 23")
              text = text.replace("minSdk = flutter.minSdkVersion", "minSdk = 23")
              path.write_text(text, encoding="utf-8")
          PY

      - name: Remove generated template test
        run: rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ascona-scanner-android-v1
          path: build/app/outputs/flutter-apk/app-release.apk
